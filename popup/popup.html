<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jira Daily Update</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body class="min-w-[360px] bg-slate-50 text-slate-900">
    <div class="p-3">
      <div class="flex items-center justify-between gap-2">
        <div>
          <div class="text-sm font-semibold">Jira Daily Update</div>
          <div class="text-xs text-slate-500">Pick a date to fetch your worklogs.</div>
        </div>
        <a
          class="text-xs font-medium text-blue-600 hover:text-blue-700"
          href="#"
          id="openOptions"
          >Options</a
        >
      </div>

      <div class="mt-3 grid grid-cols-2 gap-2">
        <label>
          <div class="text-xs font-medium text-slate-700">From</div>
          <input
            id="fromInput"
            type="date"
            class="mt-1 w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100"
          />
        </label>
        <label>
          <div class="text-xs font-medium text-slate-700">To</div>
          <input
            id="toInput"
            type="date"
            class="mt-1 w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100"
          />
        </label>
      </div>
      <div class="mt-2">
        <button
          id="getBtn"
          class="w-full rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          Get
        </button>
      </div>

      <div id="status" class="mt-3 hidden rounded-md border px-2 py-1.5 text-xs"></div>

      <div class="mt-3 flex items-center justify-between">
        <div class="text-xs text-slate-500" id="summaryText"></div>
        <div class="flex items-center gap-2">
          <button
            id="copyAllBtn"
            class="hidden rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs font-semibold text-slate-700 shadow-sm hover:bg-slate-50"
          >
            Copy all
          </button>
        </div>
      </div>

      <div id="results" class="mt-3 space-y-3"></div>
    </div>

    <script src="./popup.js" type="module"></script>
  </body>
</html>
